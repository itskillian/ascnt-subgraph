specVersion: 0.0.4
description: Ascnt is a decentralized protocol for custom fee pools on Uniswap V4.
repository:
schema:
  file: ./schema.graphql
features:
  - nonFatalErrors
  - grafting
dataSources:
  - source:
      abi: PoolManager
      address: "0x000000000004444c5dc75cB358380D2e3dE08A90"
      startBlock: 21688329
    name: PoolManager
    network: mainnet
    kind: ethereum/contract
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/poolManager.mapping.ts
      entities:
        - Pool
        - Token
      abis:
        - name: ERC20
          file: ./abis/ERC20.json
        - name: ERC20SymbolBytes
          file: ./abis/ERC20SymbolBytes.json
        - name: ERC20NameBytes
          file: ./abis/ERC20NameBytes.json
        - name: PoolManager
          file: ./abis/PoolManager.json
        - name: AggregatorHook
          file: ./abis/AggregatorHook.json
      eventHandlers:
        - event: Initialize(indexed bytes32,indexed address,indexed
            address,uint24,int24,address,uint160,int24)
          handler: handleInitialize
        - event: ModifyLiquidity(indexed bytes32,indexed
            address,int24,int24,int256,bytes32)
          handler: handleModifyLiquidity
        - event: Swap(indexed bytes32,indexed
            address,int128,int128,uint160,uint128,int24,uint24)
          handler: handleSwap
  - source:
      abi: PositionManager
      address: "0xbd216513d74c8cf14cf4747e6aaa6420ff64ee9e"
      startBlock: 21689089
    name: PositionManager
    network: mainnet
    kind: ethereum/contract
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/positionManager.mapping.ts
      entities:
        - Position
      abis:
        - name: PositionManager
          file: ./abis/PositionManager.json
      eventHandlers:
        - event: Subscription(indexed uint256,indexed address)
          handler: handleSubscription
        - event: Unsubscription(indexed uint256,indexed address)
          handler: handleUnsubscription
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
  - kind: ethereum
    name: AscntDivHook
    network: mainnet
    source:
      address: "0x29d6e0Ff868ba37fd81F84208B1BC6781dFfB0C0"
      abi: AscntDivHook
      startBlock: 24568925
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/ascnt.mapping.ts
      entities:
        - PoolManager
        - Swap
        - Pool
      abis:
        - name: AscntDivHook
          file: ./abis/AscntDivHook.json
      eventHandlers:
        - event: AfterSwap(indexed bytes32,uint160,uint256,uint256,int256,uint256,uint256)
          handler: handleAfterSwap
        - event: BeforeSwap(indexed bytes32,uint160,uint256,uint256,uint256,int256,uint24,uint256)
          handler: handleBeforeSwap
        - event: PoolConfigured(indexed bytes32,bool,uint24,uint24,uint24,uint256,uint256,uint256)
          handler: handlePoolConfigured
        - event: PoolInitialized(indexed bytes32,indexed address,indexed
            address,uint24,int24,address,uint160,int24)
          handler: handlePoolInitialized
